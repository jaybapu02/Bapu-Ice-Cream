{% extends "base.html" %}
{% load static %}
{% block title %}Order Ice Cream{% endblock %}
{% block body %}

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card border-0 shadow-lg">
          <div class="card-body p-4 p-lg-5">
            <div class="text-center mb-4">
              <h2 class="fw-bold">🍦 Order Your Ice Cream</h2>
              <p class="text-muted">Freshly made, delivered with love ❤️</p>
            </div>

            <form method="POST" id="orderForm">
              {% csrf_token %}

              <h5 class="fw-bold mb-3">Customer Details</h5>
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label">Name</label>
                  <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone</label>
                  <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="col-12">
                  <label class="form-label">Delivery Address</label>
                  <textarea name="address" class="form-control" rows="2" required></textarea>
                </div>
              </div>

              <h5 class="fw-bold mb-3">Order Details</h5>
              <div class="row g-3 mb-4">
                <div class="col-md-4">
                  <label class="form-label">Ice Cream Type</label>
                  <select name="ice_cream_type" class="form-select">
                    <option value="Scooped Ice Cream" {% if selected_type == "Scooped Ice Cream" %}selected{% endif %}>Scooped Ice Cream</option>
                    <option value="Softy Cone" {% if selected_type == "Softy Cone" %}selected{% endif %}>Softy Cone</option>
                    <option value="Family Pack" {% if selected_type == "Family Pack" %}selected{% endif %}>Family Pack</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Flavour</label>
                  <select name="flavour" class="form-select">
                    <option>Mango Magic</option>
                    <option>Vanilla Classic</option>
                    <option>Chocolate Delight</option>
                    <option>Strawberry Bliss</option>
                    <option>Butterscotch Crunch</option>
                    <option>Kesar Pista Royal</option>
                    <option>Black Currant Twist</option>
                    <option>Dry Fruit Special</option>
                    <option>Cookies & Cream</option>
                    <option>Tender Coconut Fresh</option>
                    <option>Coffee Mocha</option>
                    <option>Rainbow Fantasy</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Quantity</label>
                  <input type="number" name="quantity" class="form-control" value="1" min="1">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Size</label>
                  <select name="size" class="form-select">
                    <option>Single Scoop</option>
                    <option>Double Scoop</option>
                    <option>500 ml</option>
                    <option>1 Liter</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Toppings</label>
                  <select name="toppings" class="form-select">
                    <option>No Toppings</option>
                    <option>Choco Chips</option>
                    <option>Nuts</option>
                    <option>Caramel Syrup</option>
                  </select>
                </div>
              </div>

              <h5 class="fw-bold mb-3">Delivery & Payment</h5>
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label">Delivery Type</label>
                  <select name="delivery_type" class="form-select">
                    <option>Home Delivery</option>
                    <option>Takeaway</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Payment Mode</label>
                  <select name="payment_mode" class="form-select">
                    <option>Cash on Delivery</option>
                    <option>UPI</option>
                    <option>Card</option>
                  </select>
                </div>
              </div>

              <input type="hidden" name="total_price" id="totalPriceHidden" value="0">

              <div class="p-4 bg-light rounded-4 text-center mb-4">
                <h4 class="mb-0">Total: ₹<span id="totalPrice">0</span></h4>
              </div>

              <div class="row g-3">
                <div class="col-md-4">
                  <button type="submit" class="btn btn-outline-primary w-100 rounded-pill py-2" onclick="setAction('add_to_cart')">
                    <i class="bi bi-cart-plus"></i> Add to Cart
                  </button>
                </div>
                <div class="col-md-4">
                  <a href="{% url 'products' %}" class="btn btn-outline-secondary w-100 rounded-pill py-2">
                    <i class="bi bi-grid"></i> Products
                  </a>
                </div>
                <div class="col-md-4">
                  <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" onclick="setAction('direct_checkout')">
                    <i class="bi bi-credit-card"></i> Pay Now
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  const prices = {
    iceCream: {"Scooped Ice Cream": 120, "Softy Cone": 80, "Family Pack": 350},
    size: {"Single Scoop": 0, "Double Scoop": 40, "500 ml": 150, "1 Liter": 280},
    toppings: {"No Toppings": 0, "Choco Chips": 30, "Nuts": 40, "Caramel Syrup": 25}
  };

  function calculatePrice() {
    const type = document.querySelector('[name="ice_cream_type"]').value;
    const size = document.querySelector('[name="size"]').value;
    const topping = document.querySelector('[name="toppings"]').value;
    const qty = parseInt(document.querySelector('[name="quantity"]').value) || 1;
    const total = (prices.iceCream[type] + prices.size[size] + prices.toppings[topping]) * qty;
    document.getElementById("totalPrice").innerText = total;
    document.getElementById("totalPriceHidden").value = total;
  }

  document.querySelectorAll("select, input[name='quantity']").forEach(el => el.addEventListener("change", calculatePrice));
  calculatePrice();

  function setAction(action) {
    const form = document.getElementById("orderForm");
    if (action === "add_to_cart") {
      form.action = "{% url 'add_to_cart' %}";
    } else {
      form.action = "{% url 'direct_checkout' %}";
    }
  }
</script>

{% endblock %}
