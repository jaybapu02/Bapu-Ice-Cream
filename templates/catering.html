<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catering Enquiry | Ice-Cream Parlor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ffe4ec, #e3f2fd);
    }
    .card {
      border-radius: 20px;
    }
    .form-control, .form-select {
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <!-- Card -->
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">

          <!-- Header -->
          <div class="text-center mb-4">
            <h2 class="fw-bold">🎉 Catering Enquiry</h2>
            <p class="text-muted">
              Planning a celebration? Let us make it sweeter with our ice-cream catering 🍦
            </p>
          </div>
          <!-- SUCCESS MESSAGE -->
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}

          <!-- Form -->
          <form method="POST" action="{% url 'catering' %}">
            {% csrf_token %}

            <div class="row g-4">

              <div class="col-md-6">
                <label class="form-label">Your Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="Enter phone number" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Event Type</label>
                <select name="event_type" class="form-select" required>
                  <option value="">Select event</option>
                  <option>Birthday Party</option>
                  <option>Wedding</option>
                  <option>Corporate Event</option>
                  <option>Festival / Fair</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Event Date</label>
                <input type="date" name="event_date" class="form-control">
              </div>

              <div class="col-12">
                <label class="form-label">Number of Guests</label>
                <input type="number" name="guests" class="form-control" placeholder="Approximate guest count">
              </div>

              <div class="col-12">
                <label class="form-label">Additional Message</label>
                <textarea name="message" rows="4" class="form-control" placeholder="Tell us about flavours, theme, timing, etc."></textarea>
              </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
              <a href="/" class="btn btn-outline-secondary">
                ← Back to Home
              </a>
              <button type="submit" class="btn btn-primary btn-lg px-4">
                Submit Enquiry 🚀
              </button>
            </div>

          </form>

        </div>
      </div>

      <!-- Footer Text -->
      <p class="text-center text-muted mt-4">
        📞 We’ll contact you within 30 minutes | Available 10 AM – 10 PM
      </p>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
